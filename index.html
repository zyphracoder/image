<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zyphra — Secure Image Tool</title>

<style>
body{
  font-family: Arial;
  background:#0b1220;
  color:#fff;
  text-align:center;
  padding:40px;
}
.container{
  max-width:500px;
  margin:auto;
}
input,button{
  width:100%;
  padding:12px;
  margin:10px 0;
}
button{
  background:#3b82f6;
  color:#fff;
  border:none;
  cursor:pointer;
}
canvas{
  max-width:100%;
  margin-top:20px;
  border:1px solid #333;
}
</style>
</head>

<body>

<div class="container">
<h2>🔐 Zyphra Secure Image Tool</h2>

<!-- No restriction → works everywhere -->
<input type="file" id="upload">

<input type="text" id="imgKey" placeholder="Enter Secret Key">
<input type="text" id="fileName" placeholder="Enter file name (optional)">

<button onclick="encryptImage()">Encrypt & Download</button>
<button onclick="decryptImage()">Decrypt & Show</button>

<canvas id="canvas"></canvas>
</div>

<script>
const canvas = document.getElementById("canvas")
const ctx = canvas.getContext("2d")

// Auto filename
document.getElementById('upload').onchange = function(){
  const file = this.files[0]
  if(!file) return

  if(file.type.startsWith("image")){
    const name = file.name.replace(/\.[^/.]+$/, "")
    document.getElementById('fileName').value = name + "-secure"
  }
}

// 🔑 Key generator
async function getKey(password, salt){
  const enc = new TextEncoder()

  const keyMaterial = await crypto.subtle.importKey(
    "raw",
    enc.encode(password),
    { name: "PBKDF2" },
    false,
    ["deriveKey"]
  )

  return crypto.subtle.deriveKey(
    {
      name: "PBKDF2",
      salt: salt,
      iterations: 100000,
      hash: "SHA-256"
    },
    keyMaterial,
    { name: "AES-GCM", length: 256 },
    false,
    ["encrypt","decrypt"]
  )
}

// 🔒 Encrypt → Save as PNG
async function encryptImage(){
  const file = document.getElementById('upload').files[0]
  const password = document.getElementById('imgKey').value

  if(!file){ alert("Upload image"); return }
  if(!password){ alert("Enter key"); return }

  const data = await file.arrayBuffer()

  const salt = crypto.getRandomValues(new Uint8Array(16))
  const key = await getKey(password, salt)

  const iv = crypto.getRandomValues(new Uint8Array(12))

  const encrypted = await crypto.subtle.encrypt(
    { name:"AES-GCM", iv },
    key,
    data
  )

  // Combine salt + iv + encrypted
  const combined = new Uint8Array(salt.length + iv.length + encrypted.byteLength)
  combined.set(salt, 0)
  combined.set(iv, salt.length)
  combined.set(new Uint8Array(encrypted), salt.length + iv.length)

  // ⚡ Save as PNG (key trick)
  const blob = new Blob([combined], { type: "image/png" })
  const url = URL.createObjectURL(blob)

  const nameInput = document.getElementById('fileName').value.trim()
  const finalName = nameInput ? nameInput + ".png" : "secure-image.png"

  const a = document.createElement("a")
  a.href = url
  a.download = finalName
  a.click()
}

// 🔓 Decrypt
async function decryptImage(){
  const file = document.getElementById('upload').files[0]
  const password = document.getElementById('imgKey').value

  if(!file){ alert("Upload encrypted PNG"); return }
  if(!password){ alert("Enter key"); return }

  try{
    const data = new Uint8Array(await file.arrayBuffer())

    const salt = data.slice(0,16)
    const iv = data.slice(16,28)
    const encrypted = data.slice(28)

    const key = await getKey(password, salt)

    const decrypted = await crypto.subtle.decrypt(
      { name:"AES-GCM", iv },
      key,
      encrypted
    )

    const blob = new Blob([decrypted])
    const url = URL.createObjectURL(blob)

    const img = new Image()
    img.onload = ()=>{
      canvas.width = img.width
      canvas.height = img.height
      ctx.drawImage(img,0,0)
    }
    img.src = url

  } catch {
    alert("Wrong key OR corrupted file")
  }
}
</script>

</body>
</html>
